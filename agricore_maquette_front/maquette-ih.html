<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <style>
      :root {
        --fond: #f0e8d0;
        --fond-panneau: #d9f6ffcc;
        --fond-bouton: #f5e6c8;
        --texte: #5b4636;
        --texte-discret: #9a7f68;
        --bordure: #b14e05;
        --bordure-image: url(https://www.stardewvalleywiki.com/mediawiki/extensions/StardewValley/images/menu_border.png)
          15 stretch;
        --vert: #27ae60;
        --bleu: #2980b9;
        --rouge: #c0392b;
        font-family: "Stardew Valley";
        font-size: large;
        font-weight: 40;
      }

      * {
        box-sizing: border-box;
      }

      body {
        background: var(--fond);
        color: var(--texte);
        padding: 24px;
        display: flex;
        flex-wrap: wrap;
        gap: 28px;
        align-items: flex-start;
      }

      .panneau {
        background: var(--fond-panneau);
        border: 6px solid transparent;
        border-image: var(--bordure-image);
        padding: 12px 16px 16px;
      }

      .etiquette {
        font-weight: bold;
        color: var(--texte-discret);
      }

      .titre-section {
        margin: 0 0 10px;
        padding-bottom: 4px;
        border-bottom: 4px dashed #c4a97d;
        font-size: 1.2rem;
      }

      img {
        width: 15px;
        height: 15px;
        object-fit: contain;
        margin-right: 2px;
      }

      .bordure-pixel {
        box-shadow:
          -2px 0 0 var(--bordure),
          2px 0 0 var(--bordure),
          0 -2px 0 var(--bordure),
          0 2px 0 var(--bordure),
          inset -1px 0 0 #c4a97d,
          inset 1px 0 0 #c4a97d,
          inset 0 -1px 0 #c4a97d,
          inset 0 1px 0 #c4a97d;
      }

      input,
      select {
        background: #fdf6e3;
        color: var(--texte);
        padding: 5px 8px;
        width: 100%;
        border: none;
        font-family: inherit;
        font-size: 1.1rem;
      }
      input[readonly] {
        opacity: 0.7;
      }

      label {
        text-transform: uppercase;
      }

      .badge {
        background: #9a7f6888;
        border-radius: 20px;
        padding: 1px 7px;
        font-weight: bold;
      }
      .surplus-oui {
        color: var(--vert);
        font-weight: bold;
      }

      table {
        width: 100%;
        border-spacing: 2px;
      }
      th {
        background: #aaddf5;
        padding: 6px 8px;
        text-align: left;
        border-bottom: 2px solid #7ac8e8;
        text-transform: uppercase;
      }
      td {
        padding: 5px 8px;
        box-shadow:
          -2px 0 0 var(--bordure),
          2px 0 0 var(--bordure),
          0 -2px 0 var(--bordure),
          0 2px 0 var(--bordure),
          inset -1px 0 0 #c4a97d,
          inset 1px 0 0 #c4a97d,
          inset 0 -1px 0 #c4a97d,
          inset 0 1px 0 #c4a97d;
      }
      tr:nth-child(odd) td {
        background: #f5fcff;
      }
      tr:nth-child(even) td {
        background: #eaf7ff;
      }
      tr.selection td {
        background: #ffe8a0 !important;
        font-weight: bold;
      }

      .bouton {
        font-size: 1.2rem;
        border: 3px solid transparent;
        border-image: var(--bordure-image);
        padding: 4px 6px;
        cursor: pointer;
        font-family: inherit;
        align-items: center;
        gap: 6px;
        color: #fff;
      }
      .bouton-creer {
        background: var(--vert);
      }
      .bouton-modifier {
        background: var(--bleu);
      }
      .bouton-supprimer {
        background: var(--rouge);
      }
      .bouton-reinitialiser {
        background: var(--fond-bouton);
        color: var(--texte);
      }

      .boutons {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-top: 8px;
      }
      .formulaire {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .champ {
        display: flex;
        flex-direction: column;
        gap: 3px;
      }
      .duo {
        display: flex;
        gap: 10px;
      }
    </style>
  </head>
  <body>
    <div>
      <span class="etiquette">Inventaire des ressources</span>
      <div class="panneau" style="width: 500px">
        <p class="titre-section">
          <img src="assets/image/inventaire.png" />Liste des ressources
        </p>
        <table>
          <thead>
            <tr>
              <th>Ressource</th>
              <th>Unité</th>
              <th>Qté</th>
              <th>Prix</th>
              <th>Stock min</th>
              <th>Surplus</th>
            </tr>
          </thead>
          <tbody>
            <tr class="selection">
              <td><img src="assets/image/pomme.png" />Pomme</td>
              <td><span class="badge">Kg</span></td>
              <td>120</td>
              <td>1.20 €</td>
              <td>30</td>
              <td class="surplus-oui">Oui</td>
            </tr>
            <tr>
              <td><img src="assets/image/fraise.png" />Fraise</td>
              <td><span class="badge">Kg</span></td>
              <td>8</td>
              <td>3.50 €</td>
              <td>20</td>
              <td>Non</td>
            </tr>
          </tbody>
        </table>
        <div class="boutons">
          <button class="bouton bouton-supprimer">
            <img src="assets/image/croix.png" />Supprimer
          </button>
          <button class="bouton bouton-reinitialiser">
            <img src="assets/image/deselectionner.png" />Désélectionner
          </button>
        </div>
      </div>
    </div>

    <div>
      <span class="etiquette">Créer / Modifier une ressource</span>
      <div class="panneau" style="width: 400px">
        <p class="titre-section">
          <img src="assets/image/liste.png" />Modifier la ressource...
          <img src="assets/image/pomme.png" />Pomme
        </p>
        <div class="formulaire">
          <div class="champ">
            <label>Nom de la ressource</label>
            <select class="bordure-pixel">
              <option>— Choisir —</option>
              <option selected>Pomme</option>
              <option>Fraise</option>
            </select>
          </div>
          <div class="champ">
            <label>Unité (auto)</label>
            <input class="bordure-pixel" value="Kg" readonly />
          </div>
          <div class="duo">
            <div class="champ">
              <label>Quantité</label>
              <input class="bordure-pixel" type="number" value="120" />
            </div>
            <div class="champ">
              <label>Prix (€)</label>
              <input class="bordure-pixel" type="number" value="1.20" />
            </div>
          </div>
          <div class="champ">
            <label>Stock minimum</label>
            <input class="bordure-pixel" type="number" value="30" />
          </div>
          <div class="champ">
            <label>Surplus en vente ?</label>
            <span class="surplus-oui">Oui — surplus de 90 unité(s)</span>
          </div>
          <div class="boutons">
            <button class="bouton bouton-creer">
              <img src="assets/image/creer.png" />Créer
            </button>
            <button class="bouton bouton-modifier">
              <img src="assets/image/modifier.png" />Modifier
            </button>
            <button class="bouton bouton-reinitialiser">
              <img src="assets/image/reinitialiser.png" />Réinitialiser
            </button>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
