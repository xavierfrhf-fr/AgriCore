<div class="mb-3 row">
  <label [for]="id" class="col-sm-2 col-form-label">{{ label }}</label>

  <div class="col-sm-10">
    <ng-content></ng-content>

    @if (control.errors) {
      @for (error of control.errors | keyvalue; track error.key) {
        @if (errorMessages[error.key]) {
          <div class="invalid-feedback">{{ errorMessages[error.key] }}</div>
        }
      }
    }
  </div>
</div>
