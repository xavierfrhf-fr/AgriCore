<header>
  <div class="haut">
    <div class="logo">
      <img src="assets/image/boutique/logo-titre.png" />
      <p>La ferme chez nous !</p>
    </div>

    <div class="paysage">
      <img src="assets/image/boutique/banniere.png" />
    </div>
    <div class="slogan">
      <p><img class="maison" src="assets/image/boutique/maison.png" />Production locale</p>
      <p><img class="vache" src="assets/image/boutique/vache.png" />Bien-être locale</p>
      <p><img class="feuille" src="assets/image/boutique/feuille.png" />Zero produit chimique</p>
    </div>
  </div>
</header>

<div class="content" style="padding-bottom: 20vh; padding-top: 20vh; background-color: #eadac7">
  <div class="panier">
    <img src="assets/image/boutique/panierRempli.png" />
  </div>

  <div class="numero"><h2>Numéro de commande : 1</h2></div>

  <div class="formulaire">
    <h2>Informations personnelles</h2>

    <table>
      <!--Deja pres rempli si la personne est deja connecte -->
      <tr>
        <td>Nom</td>
        <td><input class="form-input" type="text" name="" value="" /></td>
      </tr>
      <tr>
        <td>Prénom</td>
        <td><input class="form-input" type="text" name="" value="" /></td>
      </tr>
    </table>

    <div class="separator"></div>
    <h2>Récapitulatif de la commande</h2>

    <table class="commande">
      <thead>
        <tr>
          <th>Articles</th>
          <th>Quantité</th>
          <th>Prix</th>
        </tr>
      </thead>
      <tbody>
        <tr class="selection">
          <td><img src="assets/image/boutique/pomme.png" /> Pomme</td>
          <td><span class="badge quantity-badge"> 1 Kg</span></td>
          <td>3 €</td>
        </tr>
        <tr>
          <td><img src="assets/image/boutique/fraise.png" /> Fraise</td>
          <td><span class="badge quantity-badge"> 1 Kg</span></td>
          <td>5 €</td>
        </tr>
      </tbody>
    </table>

    <div class="separator"></div>
    <h2>Livraison</h2>
    <div class="form-row">
      <label for="week">Jour de retrait/click&collect</label>
      <input id="week" class="form-input" type="week" />
    </div>

    <div class="form-row">
      <label for="time">Heure</label>
      <input id="time" class="form-input" type="time" />
    </div>

    <div class="separator"></div>
    <h2>Total</h2>
    <div class="prix">8 €</div>
    <br /><br />
    <div class="buttons">
      <button class="button-telecharger">
        <img src="assets/image/boutique/deselectionner.png" /> Télécharger ticket
      </button>
      <br /><br />
      <div class="separator"></div>
      <h3>Note</h3>
      <p class="payement">Le payement s'effectue sur place.</p>

      <div class="buttons">
        <button class="button-modifier">
          <img src="assets/image/boutique/modifier.png" /> Modifier
        </button>
        <button class="button-valider">
          <img src="assets/image/boutique/creer.png" /> Valider
        </button>
        <button class="button-supprimer">
          <img src="assets/image/boutique/croix.png" /> Supprimer
        </button>
      </div>
    </div>
  </div>
</div>
