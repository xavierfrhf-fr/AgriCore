<div class="header-fixe">
  <app-header logoTexte="La ferme chez vous !" [sloganItems]="sloganItems"> </app-header>
</div>

<div class="content" style="padding-bottom: 0vh; padding-top: 0vh; background-color: #eadac7">
  <div class="panier">
    <img class="panierRemplit2" src="assets/image/boutique/panierRemplit2.png" />
  </div>

  <div class="numero"><h2>Numéro de commande : 1</h2></div>

  <div class="formulaire">
    <h2>Informations personnelles</h2>

    <table>
      <!--Deja pres rempli si la personne est deja connecte -->
      <div class="form-row">
        <label for="nom">Nom</label>
        <input class="form-input" type="text" name="" value="" />
      </div>
      <div class="form-row">
        <label for="prenom">Prénom</label>
        <input class="form-input" type="text" name="" value="" />
      </div>
    </table>

    <div class="separator"></div>
    <h2>Récapitulatif de la commande</h2>

    <table class="commande">
      <thead>
        <tr>
          <th>Articles</th>
          <th>Quantité</th>
          <th>Prix</th>
        </tr>
      </thead>
      <tbody>
        <tr class="selection">
          <td><img class="panierPomme" src="assets/image/boutique/panierPomme.png"/> Pomme</td>
          <td><span class="badge quantity-badge"> 1 Kg</span></td>
          <td>4 €</td>
        </tr>
        <tr>
          <td><img class="panierFraise" src="assets/image/boutique/panierFraise.png" /> Fraise</td>
          <td><span class="badge quantity-badge"> 1 Kg</span></td>
          <td>9 €</td>
        </tr>
      </tbody>
    </table>

    <div class="separator"></div>
    <h2>Livraison</h2>
    <div class="form-row">
      <label for="week">Jour de retrait/click&collect</label>
      <input id="week" class="form-input" type="week" />
    </div>

    <div class="form-row">
      <label for="time">Heure</label>
      <input id="time" class="form-input" type="time" />
    </div>

    <div class="separator"></div>
    <h2>Total</h2>
    <div class="prix">7 €</div>
    <br /><br />
    <div class="buttons">
      <button class="button-telecharger">
        <img src="assets/image/boutique/deselectionner.png" /> Télécharger ticket
      </button>
      <br /><br />
      <div class="separator"></div>
      <h3>Note</h3>
      <p class="payement">Le paiement s'effectue sur place.</p>

      <div class="buttons">
        <button class="button-modifier">
          <img src="assets/image/boutique/modifier.png" /> Modifier
        </button>
        <button class="button-valider">
          <img src="assets/image/boutique/creer.png" /> Valider
        </button>
        <button class="button-supprimer">
          <img src="assets/image/boutique/croix.png" /> Supprimer
        </button>
      </div>
    </div>
  </div>
</div>

<footer>
  <nav>
    <a routerLink="/accueil" class="btn-img">
      <img src="assets/image/boutique/textBox.png" />
      <span>Accueil</span>
    </a>
    <a routerLink="/accueil" class="btn-img" (click)="logout()">
      <img src="assets/image/boutique/textBox.png" />
      <span>Déconnexion</span>
    </a>
    <a routerLink="/boutique" class="btn-img">
      <img src="assets/image/boutique/textBox.png" />
      <span>Boutique</span>
    </a>
  </nav>
  <div class="copyright">
    © 2026 Agricore. Fait avec <img src="assets/image/coeur.png" alt="coeur" />, Angular et Spring.
  </div>
</footer>
