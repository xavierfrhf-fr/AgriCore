
<td><img [src]="plante.pathSprite" style="height: 80px">  </td>

<td>
  <p>
    >
    {{plante.production}}
    <img class="img-icone" [src]="plante.ressource.pathSprite">
  </p>
</td>

<td style="align-content: center">
  @for (_ of (plante.consoEauParMin | consoEau); track $index) {
    <img class="img-icone" src="assets/image/goutte.png">
  }
</td>



@if(matureEventDone){
  <td colspan="2" style="text-align: center;"> MATURE </td>
} @else if (deadEventDone){
  <td colspan="2" style="text-align: center;"> DESECHE</td>
} @else {
  <td [class.low-humidity]="humiditeActuelle < 20" style="text-align: center;">{{ humiditeActuelle | number:'1.0-0' }} %</td>
  <td style="text-align: center;">{{ croissanceActuelle | number:'1.0-0' }} %</td>
}
<td>
  @if(matureEventDone){
    <button class="bouton bouton-creer" (click)="recolter(plante.id)">RECOLTER</button>
  } @else {
    <button class="bouton bouton-modifier"(click)="arroser(plante.id)">ARROSER</button>
  }
</td>
<td>
  <button class="bouton bouton-supprimer" (click)="supprimer(plante.id)">SUPPRIMER</button>
</td>
