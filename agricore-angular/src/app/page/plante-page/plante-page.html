<h1>Liste des plantes</h1>
@if (addPlanteOpen){
  <app-ajout-plante-compo (closeAjout)="closeAddPlante()"></app-ajout-plante-compo>
}
<button (click)="addPlanteOpen = true">Ajouter une plante</button>

<div class="plante-list">
  <table>
    <tbody>
      @for (plante of plante$ |async; track plante.id) {
        <tr>
          <td><img [src]="plante.pathSprite" class="img-icone">  </td>
          <app-info-plante
            [plante]="plante"
            (planteMature)="onPlanteMature($event.valueOf())"
            (deadEvent)="onDeadEvent($event.valueOf())"
            ></app-info-plante>
          <td>Besoin en eau :
          @for (_ of (plante.consoEauParMin | consoEau); track $index) {
            <img class="img-icone" src="assets/image/goutte.png">
          }
        </td>
          <td>
            @if(plante.mature){
              <button (click)="recolter(plante.id)">RECOLTER</button>
            } @else {
              <button (click)="arroser(plante.id)">ARROSER</button>
            }

          </td>
        </tr>
      }
    </tbody>
  </table>
</div>
