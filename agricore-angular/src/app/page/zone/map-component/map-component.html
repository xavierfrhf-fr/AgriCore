<p>map-component works!</p>
<div *ngIf="mapSize$ | async as mapSize"
     class="farm-grid"
     [style.width.px]="mapSize.x * 48"
     [style.height.px]="mapSize.y * 48"
     [style.grid-template-columns]="'repeat(' + mapSize.x + ', ' + 48 + 'px)'"
     [style.grid-template-rows]="'repeat(' + mapSize.y + ', ' + 48 + 'px)'"
     [style.background-size]="48 + 'px ' + 48 + 'px'">
</div>
