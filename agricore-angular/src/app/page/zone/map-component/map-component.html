<p>map-component works!</p>
<div *ngIf="mapSize$ | async as mapSize"
     class="farm-grid"
     [style.width.px]="mapSize.x * cellSize"
     [style.height.px]="mapSize.y * cellSize"
     [style.grid-template-columns]="'repeat(' + mapSize.x + ', ' + cellSize + 'px)'"
     [style.grid-template-rows]="'repeat(' + mapSize.y + ', ' + cellSize + 'px)'"
     [style.background-size]="cellSize + 'px ' + cellSize + 'px'">
</div>
